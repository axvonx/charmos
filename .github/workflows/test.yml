name: Test

on:
  push:
    branches:
      - main
    paths:
      - 'kernel/**'
      - 'include/**'
  pull_request:
    paths:
      - 'kernel/**'
      - 'include/**'
  workflow_dispatch: # manual trigger
  workflow_run:
    workflows: ["Update CI Container"]
    types:
      - completed

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  test:
    name: Test (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    container:
      image: ghcr.io/axvonx/charmos-x86-env:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_KEY }}

    steps:
      - name: Check out code
        uses: actions/checkout@v2

      - name: Install clang toolchain
        if: matrix.compiler == 'clang'
        run: apt-get update && apt-get install -y clang lld

      - name: Compile
        run: ./scripts/build.sh -t RelWithDebInfo --compiler ${{ matrix.compiler }} -C

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iso-${{ matrix.compiler }}
          path: build/charmos-x86_64.iso
          retention-days: 7

      - name: Run tests
        run: |
          cd build
          export TERM=dumb
          for i in $(seq 1 4); do
            echo "[INFO] (${{ matrix.compiler }}) Test iteration $i/4"

            set +e
            make tests | tee qemu.log &

            sleep 60

            if grep -q "all tests pass" qemu.log; then
              echo "[PASS] Iteration $i passed!"
              pkill -f qemu-system-x86_64
            else
              echo "[FAIL] Iteration $i failed, collecting GDB backtrace..."
              gdb -batch -x "../scripts/gdb_script" kernel/kernel || true
              pkill -f qemu-system-x86_64
              exit 1
            fi
          done
